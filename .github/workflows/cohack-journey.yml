name: 🚀 CoHack Journey

on:
  push:
  workflow_dispatch:

env:                                     # Workflow-level variable
  WORKSHOP_NAME: "GH-200 CoHack"
  TRAINER: "Himanshu Kumar"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true           # Cancel older runs on same branch

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5  #JobLevel
    steps:
      - name: sTEP WITH timeout
        timeout-minutes: 1
        run: |
          echo "This step must complete in 2 mins"
          echo "completed within time"

  
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🔨 Create Build Report
        run: |
          mkdir -p build-output
          echo "Build Report - $(date)" > build-output/build-report.txt
          echo "Commit: $GITHUB_SHA" >> build-output/build-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> build-output/build-report.txt
      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-output

  notify-team:
    needs: build
    uses: ./.github/workflows/reusable-notify.yml
    with:
      message: "Deployment complete! Run #${{ github.run_number }}"
      environment: production
    secrets:
      NOTIFY_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  
