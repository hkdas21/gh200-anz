name: CoHackJourney

on: push

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello from GH-200 Session!! Let's build something amazing today!!"

      - name: Checkout Reporsitory
        uses: actions/checkout@v6

      - name: List files
        run: ls -la

      - name: Generate ASCII Artwork
        run: |
          sudo apt-get install -y figlet
          figlet "GH-200 CoHack for ANZ"
          echo "-------------------------------------------"
          figlet -f digital "GitHub Actions"
          echo "✅ ASCII art generated using figlet!"

      - name: Run Shell Script
        run: |
          chmod +x ./greet.sh
          ./greet.sh

